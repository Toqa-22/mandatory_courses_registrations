<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrations Log Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f4f7fc; padding: 40px 20px; }
        .container { max-width: 1300px; margin: auto; }
        .table-card { background: white; padding: 35px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,.06); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 20px; }
        thead tr { background: #2563eb; color: white; }
        thead th { padding: 14px; text-align: left; }
        tbody tr { border-bottom: 1px solid #e2e8f0; }
        tbody td { padding: 14px; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="table-card">
            <h2>Active Registered Log entries</h2>
            <table>
                <thead>
                    <tr>
                        <th>Staff Name</th>
                        <th>Staff Number</th>
                        <th>Course Scope</th>
                        <th>Institution Origin Group</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        async function fetchLogs() {
            const { data: logs } = await client.from('registrations').select('*, courses(name)');
            
            document.getElementById('logTableBody').innerHTML = (logs || []).map(l => `
                <tr>
                    <td><b>${l.staff_name}</b></td>
                    <td>${l.staff_number}</td>
                    <td>${l.courses?.name || 'N/A'}</td>
                    <td>${l.institution_name_snapshot}</td>
                    <td><button class="btn-del" onclick="removeLog(${l.id}, ${l.course_id}, ${l.institution_id})">Purge</button></td>
                </tr>
            `).join('');
        }

        window.removeLog = async function(id, courseId, instId) {
            if(!confirm("Cancel and delete this registration? Limits will be credited back.")) return;

            // 1. Credit 1 seat back to the course room
            const { data: c } = await client.from('courses').select('seats').eq('id', courseId).single();
            if (c) await client.from('courses').update({ seats: c.seats + 1 }).eq('id', courseId);

            // 2. Reduce the unique course-specific counter metrics 
            const { data: map } = await client.from('course_institutions').select('id, registered_count').eq('course_id', courseId).eq('institution_id', instId).maybeSingle();
            if (map && map.registered_count > 0) {
                await client.from('course_institutions').update({ registered_count: map.registered_count - 1 }).eq('id', map.id);
            }

            // 3. Delete log entry record row execution link mapping elements
            await client.from('registrations').delete().eq('id', id);
            fetchLogs();
        };

        fetchLogs();
    </script>
</body>
</html>
