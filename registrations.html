<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrations Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fc;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        .title {
            text-align: center;
            font-size: 50px;
            color: #0f172a;
            margin-bottom: 15px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 40px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn-nav {
            padding: 12px 24px;
            background: white;
            border: 2px solid #2563eb;
            color: #2563eb;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-nav:hover {
            background: #eff6ff;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .stat-card {
            width: 200px;
            background: white;
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
            transition: .3s;
        }

        .stat-card:hover {
            transform: translateY(-8px);
        }

        .stat-label {
            font-size: 16px;
            color: #2563eb;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .stat-number {
            font-size: 45px;
            font-weight: bold;
            color: #0f172a;
        }

        .stat-text {
            color: #64748b;
            font-size: 14px;
            margin-top: 5px;
        }

        .table-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
            overflow-x: auto;
        }

        .table-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .table-card h2 {
            color: #0f172a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        thead tr {
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            color: white;
        }

        thead th {
            padding: 15px 20px;
            text-align: left;
            font-weight: 500;
        }

        thead th:first-child {
            border-radius: 12px 0 0 12px;
        }

        thead th:last-child {
            border-radius: 0 12px 12px 0;
        }

        tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: .2s;
        }

        tbody tr:hover {
            background: #f8faff;
        }

        tbody td {
            padding: 15px 20px;
            color: #0f172a;
            vertical-align: middle;
        }

        .course-badge {
            background: #eff6ff;
            color: #2563eb;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .btn-view-file {
            display: inline-block;
            background: #f1f5f9;
            color: #4f46e5;
            padding: 6px 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .btn-view-file:hover {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #64748b;
            font-size: 18px;
        }

        .export-btn {
            padding: 12px 28px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
        }

        .export-btn:hover {
            opacity: .9;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1 class="title">Registrations Dashboard</h1>
        <p class="subtitle">Review user submissions and uploaded paperwork details live.</p>

        <div class="nav-buttons">
            <a class="btn-nav" href="index.html">← Back to Course Settings</a>
        </div>

        <div class="stats" id="stats"></div>

        <div class="table-card">
            <div class="table-header-row">
                <h2>Registration Records</h2>
                <button class="export-btn" onclick="exportCSV()">Export Data (CSV)</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Phone Number</th>
                        <th>Staff Name</th>
                        <th>Staff Number</th>
                        <th>Institution</th>
                        <th>Course Target</th>
                        <th>Course Date</th>
                        <th>Attachment</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        let allData = [];

        async function loadData() {
            const { data: courses } = await client.from('courses').select('*');
            const { data: regs, error } = await client
                .from('registrations')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error retrieving dashboard data records:", error);
                return;
            }

            allData = regs.map(r => {
                const targetCourse = courses.find(c => c.id === r.course_id);
                return {
                    ...r,
                    course_name: targetCourse ? targetCourse.name : 'N/A',
                    course_date: targetCourse ? targetCourse.course_date : 'N/A'
                };
            });

            const totalRegs = allData.length;
            const courseCount = {};
            allData.forEach(r => {
                courseCount[r.course_name] = (courseCount[r.course_name] || 0) + 1;
            });

            let statsHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Logs</div>
                    <div class="stat-number">${totalRegs}</div>
                    <div class="stat-text">Registrations</div>
                </div>
            `;

            courses.forEach(c => {
                statsHTML += `
                    <div class="stat-card">
                        <div class="stat-label">${c.name}</div>
                        <div class="stat-number">${courseCount[c.name] || 0}</div>
                        <div class="stat-text">Registered</div>
                    </div>
                `;
            });

            document.getElementById('stats').innerHTML = statsHTML;

            if (allData.length === 0) {
                document.getElementById('tableBody').innerHTML = `
                    <tr><td colspan="9" class="empty">No registrations captured yet.</td></tr>
                `;
                return;
            }

            document.getElementById('tableBody').innerHTML = allData.map((r, i) => `
                <tr>
                    <td><b>${i + 1}</b></td>
                    <td>${r.phone_number || 'N/A'}</td>
                    <td>${r.staff_name}</td>
                    <td>${r.staff_number}</td>
                    <td>${r.institution}</td>
                    <td><span class="course-badge">${r.course_name}</span></td>
                    <td>${r.course_date}</td>
                    <td>
                        <a href="${r.file_url}" target="_blank" class="btn-view-file">
                            📄 Open File
                        </a>
                    </td>
                    <td>
                        <button class="btn-delete" onclick="handleDeleteRegistration(${r.id}, ${r.course_id}, '${r.staff_name.replace(/'/g, "\\'")}')">
                            ❌ Remove
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        loadData();

        window.handleDeleteRegistration = async function(regId, courseId, staffName) {
            const confirmed = confirm(`Are you sure you want to remove registration for "${staffName}"?\n\nThis action will return 1 chair capacity back to the course program.`);
            if (!confirmed) return;

            try {
                // 1. Fetch current seat configuration count to prevent racing overrides
                const { data: courseData, error: fetchError } = await client
                    .from('courses')
                    .select('seats')
                    .eq('id', courseId)
                    .single();

                if (fetchError && fetchError.code !== 'PGRST116') throw fetchError;

                // 2. If the course still exists, increase its available seats counter value
                if (courseData) {
                    const updatedSeats = courseData.seats + 1;
                    const { error: updateError } = await client
                        .from('courses')
                        .update({ seats: updatedSeats })
                        .eq('id', courseId);

                    if (updateError) throw updateError;
                }

                // 3. Purge the registration log from the database row
                const { error: deleteError } = await client
                    .from('registrations')
                    .delete()
                    .eq('id', regId);

                if (deleteError) throw deleteError;

                alert(`Successfully deleted registration for ${staffName}. The room seat capacity has increased by 1.`);
                loadData();
            } catch (err) {
                alert("Transaction loop failed to process updates cleanly: " + err.message);
            }
        };

        window.exportCSV = function () {
            if (allData.length === 0) {
                alert("No data available to translate into CSV file documents.");
                return;
            }

            const headers = ['#', 'Phone Number', 'Staff Name', 'Staff Number', 'Institution', 'Course', 'Course Date', 'Uploaded Attachment URL'];
            const rows = allData.map((r, i) => [
                i + 1,
                `"\t${(r.phone_number || '').replace(/"/g, '""')}"`,
                `"${r.staff_name.replace(/"/g, '""')}"`,
                `"${r.staff_number.replace(/"/g, '""')}"`,
                `"${r.institution.replace(/"/g, '""')}"`,
                `"${r.course_name.replace(/"/g, '""')}"`,
                r.course_date,
                r.file_url
            ]);

            const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'registrations_report.csv';
            a.click();
        }
    </script>

</body>
</html>
