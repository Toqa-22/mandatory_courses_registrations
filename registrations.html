<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrations Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f4f7fc; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1400px; margin: auto; }
        .title { text-align: center; font-size: 50px; color: #0f172a; margin-bottom: 15px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 40px; }
        .nav-buttons { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .btn-nav { padding: 12px 24px; background: white; border: 2px solid #2563eb; color: #2563eb; font-size: 15px; border-radius: 12px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .btn-nav:hover { background: #eff6ff; }
        .stats { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; margin-bottom: 40px; }
        .stat-card { width: 200px; background: white; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, .08); }
        .stat-label { font-size: 16px; color: #2563eb; margin-bottom: 12px; font-weight: bold; }
        .stat-number { font-size: 45px; font-weight: bold; color: #0f172a; }
        .table-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, .08); overflow-x: auto; }
        .table-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead tr { background: linear-gradient(90deg, #2563eb, #7c3aed); color: white; }
        thead th { padding: 15px; text-align: left; }
        tbody tr { border-bottom: 1px solid #f1f5f9; }
        tbody tr:hover { background: #f8faff; }
        tbody td { padding: 15px; color: #0f172a; vertical-align: middle; }
        .course-badge { background: #eff6ff; color: #2563eb; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .inst-badge { background: #f0fdf4; color: #16a34a; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .gender-badge { background: #f5f3ff; color: #7c3aed; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .files-container { display: flex; flex-direction: column; gap: 5px; min-width: 180px; }
        .btn-view-file { display: block; text-align: left; background: #f1f5f9; color: #4f46e5; padding: 6px 10px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 12px; border: 1px solid #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-view-file:hover { background: #4f46e5; color: white; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .export-btn { padding: 12px 28px; background: linear-gradient(90deg, #2563eb, #7c3aed); border: none; color: white; font-size: 15px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Registrations Dashboard</h1>
        <p class="subtitle">Review live tracking records, inspect custom descriptions paperwork, or purge files logs entries.</p>

        <div class="nav-buttons">
            <a class="btn-nav" href="index.html">← Back to Course Settings</a>
        </div>

        <div class="stats" id="stats"></div>

        <div class="table-card">
            <div class="table-header-row">
                <h2>Registration Records</h2>
                <button class="export-btn" onclick="exportCSV()">Export Data (CSV)</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Phone Number</th>
                        <th>Staff Name</th>
                        <th>Staff Number</th>
                        <th>Gender</th>
                        <th>Institution Origin</th>
                        <th>Course Target</th>
                        <th>Course Date</th>
                        <th>Uploaded Attachments</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        let allData = [];

        async function loadData() {
            const { data: courses } = await client.from('courses').select('*');
            const { data: regs, error } = await client.from('registrations').select('*').order('created_at', { ascending: false });

            if (error) return console.error(error);

            allData = regs.map(r => {
                const targetCourse = courses.find(c => c.id === r.course_id);
                return {
                    ...r,
                    course_name: targetCourse ? targetCourse.name : 'Deleted Course',
                    course_date: targetCourse ? targetCourse.course_date : 'N/A',
                    course_labels: targetCourse && Array.isArray(targetCourse.file_labels) ? targetCourse.file_labels : []
                };
            });

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Logs</div>
                    <div class="stat-number">${allData.length}</div>
                </div>
            `;

            document.getElementById('tableBody').innerHTML = allData.map((r, i) => {
                const filesList = Array.isArray(r.file_urls) ? r.file_urls : [];
                
                const linksHtml = filesList.map((url, idx) => {
                    const label = r.course_labels[idx] || `Attachment #${idx + 1}`;
                    return `<a href="${url}" target="_blank" class="btn-view-file" title="${label}">📄 View ${label}</a>`;
                }).join('');

                return `
                    <tr>
                        <td><b>${i + 1}</b></td>
                        <td>${r.phone_number || 'N/A'}</td>
                        <td>${r.staff_name}</td>
                        <td>${r.staff_number}</td>
                        <td><span class="gender-badge">${r.sex || 'N/A'}</span></td>
                        <td><span class="inst-badge">${r.institution_name_snapshot}</span></td>
                        <td><span class="course-badge">${r.course_name}</span></td>
                        <td>${r.course_date}</td>
                        <td><div class="files-container">${linksHtml || 'No files uploaded'}</div></td>
                        <td>
                            <button class="btn-delete" onclick="handleDeleteRegistration(${r.id}, ${r.course_id}, ${r.institution_id}, '${r.staff_name.replace(/'/g, "\\'")}')">
                                ❌ Remove
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.handleDeleteRegistration = async function(regId, courseId, instId, staffName) {
            if (!confirm(`Are you sure you want to remove the registration for "${staffName}"?\n\nThis restores course chairs availability (+1) and frees up institutional quota open slots.`)) return;

            try {
                // 1. Restore Course Chairs Counter Allocation (+1 Seat back to room)
                const { data: courseData } = await client.from('courses').select('seats').eq('id', courseId).single();
                if (courseData) {
                    await client.from('courses').update({ seats: courseData.seats + 1 }).eq('id', courseId);
                }
                
                // 2. Decrement Quota Counter from the course_institutions intersection room map row
                if (courseId && instId) {
                    const { data: mapData } = await client.from('course_institutions')
                        .select('id, registered_count')
                        .eq('course_id', courseId)
                        .eq('institution_id', instId)
                        .maybeSingle();

                    if (mapData && mapData.registered_count > 0) {
                        await client.from('course_institutions')
                            .update({ registered_count: mapData.registered_count - 1 })
                            .eq('id', mapData.id);
                    }
                }

                // 3. Delete Entry Log Row and AWAIT the completion before reloading view
                await client.from('registrations').delete().eq('id', regId);
                alert("Record removed successfully.");
                
                // Reload interface sequence cleanly
                await loadData();
            } catch (err) {
                alert("Error during restoration sequence processing: " + err.message);
            }
        };

        window.exportCSV = function () {
            if (allData.length === 0) return alert("No records found.");
            const headers = ['#', 'Phone Number', 'Staff Name', 'Staff Number', 'Gender', 'Institution Origin', 'Course Name', 'Course Date', 'Attachments'];
            const rows = allData.map((r, i) => [
                i + 1,
                `"\t${r.phone_number || ''}"`,
                `"${r.staff_name}"`,
                `"${r.staff_number}"`,
                `"${r.sex || 'N/A'}"`,
                `"${r.institution_name_snapshot}"`,
                `"${r.course_name}"`,
                r.course_date,
                `"${(r.file_urls || []).join(' | ')}"`
            ]);
            const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'registrations_report.csv';
            link.click();
        };

        loadData();
    </script>
</body>
</html>
