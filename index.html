<script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        const courseForm = document.getElementById('courseForm');
        let dynamicAttachmentsRequired = true;
        
        window.setAttachmentStatus = function(isRequired) {
            dynamicAttachmentsRequired = isRequired;
            const container = document.getElementById('conditionalFilesWrapper');
            const toggleYes = document.getElementById('toggleYes');
            const toggleNo = document.getElementById('toggleNo');

            if (isRequired) {
                toggleYes.classList.add('active');
                toggleNo.classList.remove('active');
                container.style.display = 'block';
                generateDescriptionInputs();
            } else {
                toggleYes.classList.remove('active');
                toggleNo.classList.add('active');
                container.style.display = 'none';
            }
        };

        // FIXED: Now accepts optional arrays to repopulate existing data when editing
        window.generateDescriptionInputs = function(labelsArray = null, examplesArray = null) {
            const count = labelsArray ? labelsArray.length : Math.max(1, Number(document.getElementById('requiredFilesCount').value || 1));
            
            // Sync the counter input field just in case
            document.getElementById('requiredFilesCount').value = count;

            let html = '';
            for (let i = 1; i <= count; i++) {
                // Get existing values if editing, otherwise empty strings
                const existingLabel = (labelsArray && labelsArray[i - 1]) ? labelsArray[i - 1] : '';
                const existingExample = (examplesArray && examplesArray[i - 1]) ? examplesArray[i - 1] : '';
                const isDisplay = existingExample ? 'block' : 'none';

                html += `
                    <div class="desc-row">
                        <span>File Requirements Row #${i}:</span>
                        <input type="text" class="custom-label-input" placeholder="Label Name (e.g., Civil ID)" value="${existingLabel.replace(/"/g, '&quot;')}" required style="margin-bottom:5px;">
                        
                        <input type="url" id="img-input-${i}" class="custom-image-input" placeholder="Example Image Link URL" value="${existingExample.replace(/"/g, '&quot;')}" oninput="updateFormImagePreview(${i})">
                        
                        <div id="preview-container-${i}" class="form-preview-container" style="margin-top: 8px; display: ${isDisplay};">
                            <img id="preview-img-${i}" src="${existingExample}" style="max-width: 100%; max-height: 100px; border: 1px dashed #cbd5e1;" onerror="this.parentElement.style.display='none'">
                        </div>
                    </div>
                `;
            }
            document.getElementById('descriptionInputsContainer').innerHTML = html;
        };

        window.updateFormImagePreview = function(i) {
            const val = document.getElementById(`img-input-${i}`).value.trim();
            const box = document.getElementById(`preview-container-${i}`);
            const img = document.getElementById(`preview-img-${i}`);
            if(val) { img.src = val; box.style.display = 'block'; } else { box.style.display = 'none'; }
        };

        async function fetchCourses() {
            const { data, error } = await client.from('courses').select('*').order('id', { ascending: true });
            if (error) return console.error(error);

            document.getElementById('courseTableBody').innerHTML = data.map(c => {
                const labels = Array.isArray(c.file_labels) ? c.file_labels : [];
                const examples = Array.isArray(c.file_examples) ? c.file_examples : [];
                
                let tagsHtml = '';
                if(labels.length === 0 || c.required_files === 0) {
                    tagsHtml = `<span class="badge-none">✅ No Attachments Required</span>`;
                } else {
                    tagsHtml = labels.map((l, index) => {
                        const imgUrl = examples[index];
                        const imgPreviewHtml = (imgUrl && imgUrl.trim() !== '') 
                            ? `<a href="${imgUrl}" target="_blank"><img src="${imgUrl}" class="preview-img-thumbnail" alt="Example Snapshot" onerror="this.style.display='none'"></a>` 
                            : '<small style="color:#94a3b8; display:block; margin-top:2px;">(No Example Image Attached)</small>';
                        
                        return `
                            <span class="label-tag">
                                <div><b>${index + 1}. ${l}</b></div>
                                ${imgPreviewHtml}
                            </span>`;
                    }).join('');
                }

                const escapedLabels = JSON.stringify(labels).replace(/"/g, '&quot;');
                const escapedExamples = JSON.stringify(examples).replace(/"/g, '&quot;');

                return `
                    <tr>
                        <td><b>${c.name}</b></td>
                        <td>${c.course_date}</td>
                        <td><span class="badge">${c.seats} chairs</span></td>
                        <td><div class="label-container">${tagsHtml}</div></td>
                        <td>
                            <button class="btn-action btn-edit" onclick="editCourse(${c.id}, '${c.name.replace(/'/g, "\\'")}', '${c.course_date}', ${c.seats}, ${escapedLabels}, ${escapedExamples})">Edit</button>
                            <button class="btn-action btn-del" onclick="deleteCourse(${c.id})">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        courseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('courseId').value;
            const name = document.getElementById('courseName').value;
            const course_date = document.getElementById('courseDate').value;
            const seats = Number(document.getElementById('courseSeats').value);
            
            let file_labels = [];
            let file_examples = [];

            if (dynamicAttachmentsRequired) {
                const labelInputs = document.querySelectorAll('.custom-label-input');
                const imgInputs = document.querySelectorAll('.custom-image-input');
                file_labels = Array.from(labelInputs).map(input => input.value.trim() || "Required Document");
                file_examples = Array.from(imgInputs).map(input => input.value.trim() || "");
            }

            const payload = { 
                name, 
                course_date, 
                seats, 
                required_files: dynamicAttachmentsRequired ? file_labels.length : 0, 
                file_labels: file_labels,
                file_examples: file_examples
            };

            if (id) {
                await client.from('courses').update(payload).eq('id', id);
            } else {
                await client.from('courses').insert(payload);
            }

            courseForm.reset();
            document.getElementById('courseId').value = '';
            document.getElementById('requiredFilesCount').value = '1';
            document.getElementById('formTitle').innerText = "Create New Course";
            document.getElementById('submitBtn').innerText = "Save Course Setup";
            setAttachmentStatus(true);
            fetchCourses();
        });

        // FIXED: Now passes arrays explicitly into the form view instead of using the simple change triggers
        window.editCourse = function(id, name, date, seats, labelsArray, examplesArray) {
            document.getElementById('courseId').value = id;
            document.getElementById('courseName').value = name;
            document.getElementById('courseDate').value = date;
            document.getElementById('courseSeats').value = seats;
            
            document.getElementById('formTitle').innerText = "Modify Course #" + id;
            document.getElementById('submitBtn').innerText = "Apply Updates";
            
            if (labelsArray && labelsArray.length > 0) {
                dynamicAttachmentsRequired = true;
                document.getElementById('toggleYes').classList.add('active');
                document.getElementById('toggleNo').classList.remove('active');
                document.getElementById('conditionalFilesWrapper').style.display = 'block';
                
                // Directly pass arrays to render inputs with values intact
                generateDescriptionInputs(labelsArray, examplesArray);
            } else {
                document.getElementById('requiredFilesCount').value = '1';
                dynamicAttachmentsRequired = false;
                document.getElementById('toggleYes').classList.remove('active');
                document.getElementById('toggleNo').classList.add('active');
                document.getElementById('conditionalFilesWrapper').style.display = 'none';
            }
        };

        window.deleteCourse = async function(id) {
            if (!confirm("Are you sure you want to remove this course configuration completely?")) return;
            await client.from('courses').delete().eq('id', id);
            fetchCourses();
        };

        setAttachmentStatus(true);
        fetchCourses();
    </script>
