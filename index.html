<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Settings Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f4f7fc; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1250px; margin: auto; }
        .title { text-align: center; font-size: 45px; color: #0f172a; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 40px; }
        .nav-buttons { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .btn-nav { padding: 12px 24px; background: white; border: 2px solid #2563eb; color: #2563eb; font-size: 15px; border-radius: 12px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .btn-nav:hover { background: #eff6ff; }
        .main-grid { display: grid; grid-template-columns: 1fr 1.8fr; gap: 30px; }
        @media(max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,.06); }
        .card h2 { margin-bottom: 20px; color: #0f172a; font-size: 22px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #334155; font-size: 14px; font-weight: bold; }
        input, select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 15px; }
        input:focus { outline: none; border-color: #2563eb; }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(90deg, #2563eb, #7c3aed); border: none; color: white; font-size: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-submit:hover { opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        thead tr { background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
        thead th { padding: 14px; text-align: left; color: #475569; font-weight: bold; }
        tbody tr { border-bottom: 1px solid #f1f5f9; }
        tbody td { padding: 14px; color: #0f172a; vertical-align: middle; }
        .badge { background: #eff6ff; color: #2563eb; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: bold; display: inline-block; }
        .file-count-badge { background: #f3e8ff; color: #7c3aed; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: bold; display: inline-block; }
        .btn-action { padding: 6px 12px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold; }
        .btn-edit { background: #f1f5f9; color: #1e293b; margin-right: 5px; }
        .btn-edit:hover { background: #e2e8f0; }
        .btn-del { background: #fee2e2; color: #ef4444; }
        .btn-del:hover { background: #fca5a5; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Course Configuration</h1>
        <p class="subtitle">Manage courses, seat capacities, and required tracking documentation limits.</p>

        <div class="nav-buttons">
            <a class="btn-nav" href="form.html">Go to Public Registration Form →</a>
            <a class="btn-nav" href="registrations.html">Go to Registration Logs Dashboard →</a>
        </div>

        <div class="main-grid">
            <div class="card">
                <h2 id="formTitle">Create New Course</h2>
                <form id="courseForm">
                    <input type="hidden" id="courseId">
                    <div class="form-group">
                        <label>Course Name</label>
                        <input type="text" id="courseName" placeholder="e.g., Basic Life Support" required>
                    </div>
                    <div class="form-group">
                        <label>Course Date</label>
                        <input type="date" id="courseDate" required>
                    </div>
                    <div class="form-group">
                        <label>Available Chairs (Seats)</label>
                        <input type="number" id="courseSeats" placeholder="e.g., 25" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>Number of Required Documents</label>
                        <input type="number" id="requiredFilesCount" placeholder="e.g., 2" min="1" max="10" value="1" required>
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">Save Course Setup</button>
                </form>
            </div>

            <div class="card">
                <h2>Active Monitored Courses</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Date</th>
                            <th>Chairs Left</th>
                            <th>Required Files</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="courseTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        const form = document.getElementById('courseForm');
        
        async function fetchCourses() {
            const { data, error } = await client.from('courses').select('*').order('id', { ascending: true });
            if (error) return console.error(error);

            document.getElementById('courseTableBody').innerHTML = data.map(c => {
                // Determine count dynamically based on database column setup structure
                let count = 1;
                if (c.required_files !== undefined) {
                    count = c.required_files;
                } else if (Array.isArray(c.file_labels)) {
                    count = c.file_labels.length;
                }

                return `
                    <tr>
                        <td><b>${c.name}</b></td>
                        <td>${c.course_date}</td>
                        <td><span class="badge">${c.seats} chairs</span></td>
                        <td><span class="file-count-badge">📂 ${count} File(s) Required</span></td>
                        <td>
                            <button class="btn-action btn-edit" onclick="editCourse(${c.id}, '${c.name.replace(/'/g, "\\'")}', '${c.course_date}', ${c.seats}, ${count})">Edit</button>
                            <button class="btn-action btn-del" onclick="deleteCourse(${c.id})">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('courseId').value;
            const name = document.getElementById('courseName').value;
            const course_date = document.getElementById('courseDate').value;
            const seats = Number(document.getElementById('courseSeats').value);
            const count = Number(document.getElementById('requiredFilesCount').value);

            // Creates structural payload for compatibility fallback parameters
            const labelsArray = [];
            for(let i=1; i <= count; i++) {
                labelsArray.push(`Document #${i}`);
            }

            const payload = { 
                name, 
                course_date, 
                seats,
                required_files: count,
                file_labels: labelsArray 
            };

            if (id) {
                await client.from('courses').update(payload).eq('id', id);
            } else {
                await client.from('courses').insert(payload);
            }

            form.reset();
            document.getElementById('courseId').value = '';
            document.getElementById('requiredFilesCount').value = '1';
            document.getElementById('formTitle').innerText = "Create New Course";
            document.getElementById('submitBtn').innerText = "Save Course Setup";
            fetchCourses();
        });

        window.editCourse = function(id, name, date, seats, count) {
            document.getElementById('courseId').value = id;
            document.getElementById('courseName').value = name;
            document.getElementById('courseDate').value = date;
            document.getElementById('courseSeats').value = seats;
            document.getElementById('requiredFilesCount').value = count;
            document.getElementById('formTitle').innerText = "Modify Course #" + id;
            document.getElementById('submitBtn').innerText = "Apply Updates";
        };

        window.deleteCourse = async function(id) {
            if (!confirm("Are you sure you want to remove this course configuration completely?")) return;
            await client.from('courses').delete().eq('id', id);
            fetchCourses();
        };

        fetchCourses();
    </script>
</body>
</html>
