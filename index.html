<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management Panel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fc;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .title {
            text-align: center;
            font-size: 50px;
            color: #0f172a;
            margin-bottom: 15px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 40px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn-nav {
            padding: 12px 24px;
            background: white;
            border: 2px solid #2563eb;
            color: #2563eb;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-nav:hover {
            background: #eff6ff;
        }

        .management-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .management-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .06);
            height: fit-content;
        }

        .card h2 {
            margin-bottom: 20px;
            color: #0f172a;
            font-size: 22px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #475569;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-add:hover {
            opacity: 0.9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        thead tr {
            background: #0f172a;
            color: white;
        }

        thead th {
            padding: 12px 15px;
            text-align: left;
            font-weight: 500;
        }

        thead th:first-child { border-radius: 8px 0 0 8px; }
        thead th:last-child { border-radius: 0 8px 8px 0; }

        tbody tr {
            border-bottom: 1px solid #f1f5f9;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        tbody td {
            padding: 12px 15px;
            color: #334155;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .empty-text {
            text-align: center;
            padding: 30px;
            color: #64748b;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 class="title">Course Settings</h1>
        <p class="subtitle">Create new training programs or wipe out expired configurations live.</p>

        <div class="nav-buttons">
            <a class="btn-nav" href="registrations.html">View User Log Dashboard →</a>
        </div>

        <div class="management-grid">
            
            <div class="card">
                <h2>Create New Course</h2>
                <div class="form-group">
                    <label for="newCourseName">Course Name</label>
                    <input type="text" id="newCourseName" placeholder="e.g., PALS, Basic Trauma">
                </div>
                <div class="form-group">
                    <label for="newCourseSeats">Total Available Chairs</label>
                    <input type="number" id="newCourseSeats" value="5" min="1">
                </div>
                <div class="form-group">
                    <label for="newCourseDate">Scheduled Date</label>
                    <input type="date" id="newCourseDate">
                </div>
                <button class="btn-add" id="addBtn" onclick="handleAddCourse()">Save Course to DB</button>
            </div>

            <div class="card" style="overflow-x: auto;">
                <h2>Active Database Courses</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Course Name</th>
                            <th>Date</th>
                            <th>Chairs Remaining</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="courseTableBody"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        async function renderCoursesDashboard() {
            const { data, error } = await client
                .from('courses')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                console.error("Database tracking read failure:", error);
                return;
            }

            const tbody = document.getElementById('courseTableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="empty-text">No active courses configured inside your database tables.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(course => `
                <tr>
                    <td><b>${course.name}</b></td>
                    <td>${course.course_date}</td>
                    <td>${course.seats} Chairs</td>
                    <td>
                        <button class="btn-delete" onclick="handleDeleteCourse(${course.id}, '${course.name}')">
                            ❌ Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        renderCoursesDashboard();

        window.handleAddCourse = async function() {
            const nameField  = document.getElementById('newCourseName');
            const seatsField = document.getElementById('newCourseSeats');
            const dateField  = document.getElementById('newCourseDate');
            const addBtn     = document.getElementById('addBtn');

            const name  = nameField.value.trim();
            const seats = parseInt(seatsField.value);
            const date  = dateField.value;

            if (!name || !seats || !date) {
                alert("Please fill in all layout blocks completely before saving data changes.");
                return;
            }

            addBtn.disabled = true;
            addBtn.innerText = "Adding item...";

            try {
                const { error } = await client
                    .from('courses')
                    .insert([{ name: name, seats: seats, course_date: date }]);

                if (error) throw error;

                alert(`Successfully generated and created "${name}" course program structure inside configuration tables.`);
                
                nameField.value = "";
                seatsField.value = "5";
                dateField.value = "";
                
                renderCoursesDashboard();
            } catch (err) {
                alert("Could not append data structures: " + err.message);
            } finally {
                addBtn.disabled = false;
                addBtn.innerText = "Save Course to DB";
            }
        };

        window.handleDeleteCourse = async function(id, name) {
            const confirmed = confirm(`Are you sure you want to permanently delete "${name}"?\n\nWARNING: Deleting this course will automatically delete all user registrations associated with it!`);
            
            if (!confirmed) return;

            try {
                const { error } = await client
                    .from('courses')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                alert(`Successfully purged and removed "${name}" completely.`);
                renderCoursesDashboard();
            } catch (err) {
                alert("Deletion sequence cancelled or broken: " + err.message);
            }
        };
    </script>

</body>
</html>
